<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
  <meta charset="UTF-8">
  <title>고객문의</title>
  <link rel="stylesheet" th:href="@{/css/qna/list.css}">

</head>

<body>
<div class="container" layout:fragment="content">

  <h1 style="text-align: center; margin-bottom: 20px;">고객문의</h1>

  <div class="notice-box">
    여기에 안내문구를 입력하세요.
    <br>여기에 안내문구를 입력하세요.
    <br>여기에 안내문구를 입력하세요.
    <br>여기에 안내문구를 입력하세요.
  </div>

  <!-- 검색폼 -->
  <div class="search-box-wrapper">
    <form action="/qna/list" method="get" role="search" class="d-flex flex-column align-items-center">

      <!-- 윗줄: 날짜 -->
      <div class="search-line">
        <input type="date"
               id="start"
               name="tripStart"
               value="2025-06-01"
               min="2025-06-01"
               max="2026-06-01" />

        <span style="flex: 0; line-height: 38px;">~</span>

        <input type="date"
               id="end"
               name="tripEnd"
               min="2025-06-01"
               max="2026-06-01" />
      </div>

      <!-- 아랫줄: 필터 -->
      <div class="search-line">
        <select class="form-select" name="type" aria-label="Select Category">
          <option th:selected="${ph.type == null ? true : false}">--선택--</option>
          <option th:value="p" th:selected="${ph.type == 'p'}">결제</option>
          <option th:value="r" th:selected="${ph.type == 'r'}">환불</option>
          <option th:value="f" th:selected="${ph.type == 'f'}">시설</option>
          <option th:value="s" th:selected="${ph.type == 's'}">서비스</option>
          <option th:value="e" th:selected="${ph.type == 'e'}">기타</option>
        </select>
        <input class="form-control" name="keyword" th:value="${ph.keyword}" type="search" placeholder="Search" />
        <input type="hidden" name="pageNo" th:value="1" />
        <button type="submit" class="btn btn-primary">Search</button>
      </div>

    </form>
  </div>

  <!-- 테이블 -->
  <table class="table">
    <thead>
    <tr>
      <th scope="col">No</th>
      <th scope="col">카테고리</th>
      <th scope="col" colspan="2">제목</th>
      <th scope="col">작성자</th>
      <th scope="col">작성일</th>
      <th scope="col">진행</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="bvo : ${list}">
      <th scope="row">[[${bvo.bno}]]</th>
      <td>[[${bvo.category}]]</td>
      <td><a th:href="@{/qna/detail(bno=${bvo.bno})}">[[${bvo.title}]]</a></td>
      <td>[[${bvo.writer}]]</td>
      <td>[[${bvo.regDate}]]</td>
      <td>[[${bvo.check}]]</td>
    </tr>
    </tbody>
  </table>

  <!-- 작성 버튼 -->
  <div class="d-grid gap-2 d-md-flex justify-content-md-end">
    <a th:href="@{register}" class="btn btn-primary">작성</a>
  </div>



  <nav aria-label="Page navigation example">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${ph.hasPrev eq false ? 'disabled' : ''}">
        <a class="page-link" th:href="@{/qna/list(pageNo=${ph.startPage-1}, type=${ph.type}, keyword=${ph.keyword})}" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>
      <!--/* begin end 옵션이 없음. ${#numbers.sequence(from, to)} */-->
      <th:block th:each="i:${#numbers.sequence(ph.startPage, ph.endPage)}">
        <li class="page-item" th:classappend="${ph.pageNo eq i ? 'active' : ''}">
          <a class="page-link" th:href="@{/qna/list(pageNo=${i}, type=${ph.type}, keyword=${ph.keyword})}">[[${i}]]</a>
        </li>
      </th:block>

      <li class="page-item" th:classappend="${ph.hasNext eq false ? 'disabled' : ''}">
        <a class="page-link" th:href="@{/qna/list(pageNo=${ph.endPage+1}, type=${ph.type}, keyword=${ph.keyword})}" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>
    </ul>
  </nav>



</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const formattedDate = `${yyyy}-${mm}-${dd}`;

    const endInput = document.getElementById('end');

    // 오늘 날짜가 min~max 범위 내에 있으면 오늘 날짜로, 아니면 min 날짜로 설정
    if (formattedDate >= endInput.min && formattedDate <= endInput.max) {
      endInput.value = formattedDate;
    } else {
      endInput.value = endInput.min;
    }

    console.log('입력값:', endInput.value);
  });
</script>
</body>
</html>
