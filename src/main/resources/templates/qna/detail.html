<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<section layout:fragment="customStyle">
  <link rel="stylesheet" th:href="@{/css/qna/detail.css}" />
</section>

<!--<head>-->
<!--  <meta charset="UTF-8">-->

<!--</head>-->
<!--<body>-->
<div class="container" layout:fragment="content">
  <h2 class="page-title">문의내용</h2>

  <!-- category + title -->
  <div class="form-group">
    <label for="c">카테고리</label>
    <input type="text"
           th:value="${customeriqboardfileDTO.boardDTO.category}" id="c" class="input-box short" readonly>
  </div>

  <input type="hidden" name="bno" th:value="${customeriqboardfileDTO.boardDTO.bno}">
  <div class="form-group">
    <label for="t">제목</label>
    <input type="text" class="input-box"
           name="title" th:value="${customeriqboardfileDTO.boardDTO.title}" id="t" readonly>
  </div>

  <!-- writer: form-group-vertical 클래스 추가 -->
  <div class="form-group form-group-vertical">
    <label for="w">작성자</label>
    <input type="text" class="input-box small"
           name="writer" th:value="${customeriqboardfileDTO.boardDTO.userEmail}" id="w" readonly>
  </div>

  <!-- regDate: form-group-vertical 클래스 추가 -->
  <div class="form-group form-group-vertical">
    <label for="r">작성일</label>
    <input type="text" class="input-box small"
           th:value="${customeriqboardfileDTO.boardDTO.regDate}" id="r" readonly>
  </div>

  <!-- content -->
  <div class="form-group">
    <textarea type="text" class="form-control"
              name="content" id="con" cols="30" rows="10" readonly placeholder="문의 내용을 표시합니다.">[[${customeriqboardfileDTO.boardDTO.content}]]</textarea>
  </div>

  <!-- 파일첨부 -->
  <div class="file-upload">
    <input type="text" class="upload-name" placeholder="선택된 파일 없음" disabled="disabled">
    <label for="ex_filename">업로드</label>
    <input type="file" id="ex_filename" class="upload-hidden" multiple>
  </div>

  <!-- 버튼 -->
  <div class="button-row">
    <button type="button" id="modBtn" class="btn btn-warning">Modify</button>
    <button type="button" id="delBtn" class="btn btn-danger">Remove</button>
    <button type="button" id="listBtn" class="btn btn-primary">List</button>
  </div>
</div>

<script th:src="@{/js/qna/boardDetail.js}"></script>

<script>
  const realUpload = document.getElementById('ex_filename');
  const uploadName = document.querySelector('.upload-name');

  realUpload.addEventListener('change', function () {
    const files = Array.from(this.files);
    if (files.length > 0) {
      const names = files.map(file => file.name).join(', ');
      uploadName.value = names;
    } else {
      uploadName.value = '선택된 파일 없음';
    }
  });
</script>
