<!DOCTYPE html>
<html lang="en"
     xmlns:th="http://www.thymeleaf.org">
<div th:fragment="header">
    <!-- 헤더 콘텐츠 -->
    <header class="site-header">
        <div class="wrapper header-wrapper">
            <div class="inner header-inner">
                <!-- Logo (왼쪽 정렬) -->
                <a href="/" class="logo">
                    <img src="/image/Berry_logo.png" alt="로고">
                </a>
                <!-- 우측 액션 아이콘 및 버튼 그룹 -->
                <div class="header-actions">
                    <a href="/notifications" class="icon-btn">
                        <img src="/image/icon-notification.png" alt="알림" class="header-icon" />
                    </a>
                    <a href="/favorites" class="icon-btn">
                        <img src="/image/icon-favorite.png" alt="즐겨찾기" class="header-icon" />
                    </a>
                    <a href="/login"  class="btn-login">로그인</a>
                    <a href="/signup" class="btn-signup">회원가입</a>
                </div>
            </div>
        </div>
    </header>
</div>
