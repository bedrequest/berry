<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.next.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/layout}">
<section layout:fragment="customStyle">
  <link rel="stylesheet" th:href="@{/css/indexTest.css}">
  <link rel="stylesheet" th:href="@{/css/lodge/bookmark.css}">
  <link rel="stylesheet" th:href="@{/css/review/review.css}">
  <link rel="stylesheet" th:href="@{/css/main_section_two.css}">
</section>
<div layout:fragment="content">

  <div id="image-slide-section" class="section">
    image slide section
  </div>

  <div id="best-lodges-section" class="section">
    <h2 class="ms2__title sr-only">가장 많이 예약된 숙소 Top 5</h2>

    <div class="ms2__slider swiper-container full-screen-slider">
      <div class="swiper-wrapper">
        <div class="ms2__slide swiper-slide"
             th:each="lodge : ${top5}"
             th:style="|background-image: url(${lodge.lodgeImgUrl});|">

          <div class="ms2__overlay slide-overlay">
            <!-- A) 정보 패널 -->
            <div class="ms2__info-panel info-panel">
              <h3 class="ms2__name"
                  th:text="${lodge.lodgeName}">숙소 이름</h3>
              <p class="ms2__location location"
                 th:text="${lodge.lodgeAddr} + ' · ₩' + ${lodge.minStayPrice} + '/박'">
                위치 · ₩123,000/박
              </p>
            </div>

            <!-- B) 차트 & 요약 -->
            <div class="ms2__data-panel data-panel">
              <div class="ms2__chart chart"
                   th:attr="data-stats=${lodge.tagStatsJson}">
                <canvas class="ms2__chart-canvas"></canvas>
              </div>
              <div class="ms2__summary ai-summary"
                   th:text="${lodge.aiSummary}">
                AI 요약 텍스트…
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="ms2__nav-prev swiper-button-prev" aria-label="이전 숙소"></div>
      <div class="ms2__nav-next swiper-button-next" aria-label="다음 숙소"></div>
      <div class="ms2__pagination swiper-pagination"></div>
    </div>
  </div>

  <div id="search-section" class="section">
    <!--/* 배경 이미지 슬라이드 */-->
    <div id="search-section-background-slide" class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide slide1"></div>
        <div class="swiper-slide slide2"></div>
        <div class="swiper-slide slide3"></div>

        <div class="swiper-slide slide1"></div>
        <div class="swiper-slide slide2"></div>
        <div class="swiper-slide slide3"></div>
      </div>
    </div>

    <!--/* 문구 */-->
    <div id="search-section-phrase">
      <span>Berry.에서 숙소를 검색해보세요.</span>
    </div>

    <!--/* 검색창 */-->
    <div th:insert="~{fragments/search :: search}"></div>
  </div>

  <script type="module" th:src="@{/js/indexScroll.js}"></script>
  <script type="module" th:src="@{/js/indexSearch.js}"></script>
  <script type="module" th:inline="javascript" sec:authorize="${isAuthenticated()}">
    import(/*[[@{/js/lodge/bookmark.js}]]*/).then(module => {
      module.default(/*[[${userId}]]*/);
    });
  </script>
  <script type="module" th:src="@{/js/main_section_two.js}"></script>
</div>
